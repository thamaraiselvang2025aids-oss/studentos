name: studentos_ai
description: Personal AI Operating System for Students - Academics, Hub, and Career Twin.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  http: ^1.2.1
  file_picker: ^8.0.0
  fl_chart: ^0.66.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  uuid: ^4.3.3
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
